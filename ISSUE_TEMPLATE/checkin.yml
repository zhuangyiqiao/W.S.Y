name: Daily Check-in
description: 三人减脂打卡表单
title: "[Check-in] "
labels: ["checkin"]
body:
  - type: dropdown
    id: user
    attributes:
      label: User
      description: 请选择你的名字
      options:
        - 漾
        - 闪
        - 源
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Date
      description: 使用 YYYY-MM-DD
      placeholder: 2026-04-15
    validations:
      required: true

  - type: dropdown
    id: checkin_type
    attributes:
      label: Check-in Type
      options:
        - 健身房
        - 居家运动
        - 饮食稳定
        - 补卡
        - 经期无暴食
    validations:
      required: true

  - type: input
    id: duration
    attributes:
      label: Duration (minutes)
      placeholder: 20
    validations:
      required: false

  - type: input
    id: steps
    attributes:
      label: Steps
      placeholder: 8000
    validations:
      required: false

  - type: input
    id: evidence
    attributes:
      label: Evidence Link
      placeholder: https://...
    validations:
      required: false

  - type: textarea
    id: note
    attributes:
      label: Note
      description: 简短备注
      placeholder: 今天快走20分钟，经期无暴食
    validations:
      required: false
