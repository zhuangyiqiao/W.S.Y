name: Process Check-in

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Parse issue and update JSON
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          python <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          body = os.environ["ISSUE_BODY"]
          title = os.environ["ISSUE_TITLE"]
          issue_url = os.environ["ISSUE_URL"]

          # 只处理 [Check-in] 开头的 issue，避免误伤别的 issue
          if not title.startswith("[Check-in]"):
              print("Not a check-in issue, skip processing.")
              raise SystemExit(0)

          def extract(field):
              pattern = rf"### {re.escape(field)}\s*(.*?)\s*(?=### |\Z)"
              m = re.search(pattern, body, re.S)
              if m:
                  value = m.group(1).strip()
                  if value == "_No response_":
                      return ""
                  return value
              return ""

          entry = {
              "title": title,
              "issue_url": issue_url,
              "user": extract("User"),
              "date": extract("Date"),
              "type": extract("Check-in Type"),
              "duration": extract("Duration (minutes)"),
              "steps": extract("Steps"),
              "evidence": extract("Evidence Link"),
              "note": extract("Note")
          }

          path = Path("data/checkins.json")
          if path.exists():
              data = json.loads(path.read_text(encoding="utf-8"))
          else:
              data = []

          data.append(entry)
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
          print("checkins.json updated.")
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/checkins.json
          git commit -m "Add check-in from issue" || echo "No changes to commit"
          git push
